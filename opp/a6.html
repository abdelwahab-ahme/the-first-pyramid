<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Hub - Abdelwahab</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{display:flex;height:100vh;transition:0.4s;}
body.dark{background:#0f172a;color:white;}
body.light{background:#f1f5f9;color:#111;}

.sidebar{
    width:30%;
    background:#111827;
    color:white;
    padding:20px;
    overflow-y:auto;
}

.sidebar h2{text-align:center;margin-bottom:15px;}

.quote{
    background:#1f2937;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
    font-size:14px;
    text-align:center;
}

.lecture{
    padding:15px;
    margin-bottom:10px;
    background:#1f2937;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}
.lecture:hover{background:#2563eb;}
.lecture.active{background:#16a34a;}

.progress-container{margin-top:15px;}
.progress-bar{
    width:100%;height:10px;background:#374151;
    border-radius:5px;overflow:hidden;
}
.progress{
    height:100%;width:0%;
    background:#22c55e;transition:0.3s;
}

.timer{margin-top:15px;text-align:center;}

.controls{
    margin-top:15px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

button{
    padding:8px;border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;color:white;
}

.content{
    width:70%;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
}

.tech-bg{
    position:absolute;
    width:100%;height:100%;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#312e81);
    z-index:-1;
}

iframe{display:none;}

.welcome{font-size:26px;text-align:center;}

.menu-btn{
    display:none;
    position:absolute;
    top:15px;
    left:15px;
    background:#2563eb;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    z-index:1000;
}

@media(max-width:768px){
    body{flex-direction:column;}
    .sidebar{
        position:fixed;
        width:75%;
        height:100%;
        left:-100%;
        top:0;
        z-index:999;
        transition:0.3s;
    }
    .sidebar.show{left:0;}
    .content{width:100%;height:100vh;}
    .menu-btn{display:block;}
}
</style>
</head>

<body class="dark">
<button class="menu-btn" onclick="toggleSidebar()">☰</button>

<div class="sidebar">
<h2>📚 المحاضرات</h2>

<div class="quote" id="quoteBox"></div>

<div class="lecture" onclick="openPDF(this,'./pdf/موارد بشرية 1.pdf',0)">محاضرة 1</div>
<div class="lecture" onclick="openPDF(this,'./pdf/موارد بشرية 2.pdf',1)">محاضرة 2</div>
<div class="lecture" onclick="openPDF(this,'./pdf/موارد بشرية 3.pdf',2)">محاضرة 3</div>
    <div class="lecture" onclick="openPDF(this,'./pdf/موارد بشرية 4.pdf',3)">محاضرة 4</div>
    <div class="lecture" onclick="openPDF(this,'./pdf/موارد بشرية 5.pdf',4)">محاضرة 5</div> 
    <div class="lecture" onclick="openPDF(this,'./pdf/موارد بشرية 6.pdf',5)">محاضرة 6</div>
    <div class="lecture" onclick="openPDF(this,'./pdf/موارد بشرية 7.pdf',6)">محاضرة 7</div>
    <div class="lecture" onclick="openPDF(this,'./pdf/موارد بشرية 8.pdf',7)">محاضرة 8</div> 
    <div class="lecture" onclick="openPDF(this,'./pdf/موارد بشرية 9.pdf',8)">محاضرة 9</div> 
    <div class="lecture" onclick="openPDF(this,'./pdf/بنك اسئلة موارد.pdf',9)">مراجعة ميد ترم</div> 
    <div class="lecture" onclick="openPDF(this,'./pdf/بنك اسئلة مواردنهائي.pdf',10)">مراجعة فاينل</div>

<div class="progress-container">
<p>نسبة التقدم</p>
<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>
</div>

<div class="timer">
⏱ وقت المذاكرة: <span id="time">0</span>
</div>

<div class="controls">
<button onclick="toggleMode()">🌙 / ☀</button>
<button onclick="startTimer()">▶</button>
<button onclick="resetTimer()">⏹</button>

<button onclick="startReading()">🔊 قراءة</button>
<button onclick="stopReading()">⏹ إيقاف القراءة</button>

<input type="color" onchange="changeColor(this.value)">
<button onclick="clearDrawing()">🧽 مسح</button>
</div>
</div>

<div class="content">
<div class="tech-bg"></div>

<div class="welcome" id="welcome">
ابدأ رحلتك 🔥
</div>

<div id="pdfContainer" style="width:100%;height:100%;overflow:auto;display:none;"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>

/* ===== متغيرات ===== */
let seconds = 0;
let timerInterval;
let currentPDFText = "";
let speechUtterance;
let currentColor = "#ff0000";

/* ===== فتح PDF ===== */
function openPDF(element,file){

document.getElementById("welcome").style.display="none";

const container = document.getElementById("pdfContainer");
container.style.display="block";
container.innerHTML="";

pdfjsLib.getDocument(file).promise.then(function(pdf){

extractTextFromPDF(pdf);

for(let i=1;i<=pdf.numPages;i++){
pdf.getPage(i).then(function(page){

const viewport = page.getViewport({scale:1.2});

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

canvas.height = viewport.height;
canvas.width = viewport.width;

const wrapper = document.createElement("div");
wrapper.style.position="relative";

const drawCanvas = document.createElement("canvas");
drawCanvas.width = canvas.width;
drawCanvas.height = canvas.height;
drawCanvas.style.position="absolute";
drawCanvas.style.top="0";
drawCanvas.style.left="0";

wrapper.appendChild(canvas);
wrapper.appendChild(drawCanvas);
container.appendChild(wrapper);

page.render({canvasContext:ctx,viewport:viewport});

/* رسم */
let drawing=false;
let dctx = drawCanvas.getContext("2d");

drawCanvas.onmousedown=()=>drawing=true;
drawCanvas.onmouseup=()=>drawing=false;
drawCanvas.onmousemove=(e)=>{
if(!drawing)return;
dctx.lineWidth=3;
dctx.strokeStyle=currentColor;
dctx.lineTo(e.offsetX,e.offsetY);
dctx.stroke();
dctx.beginPath();
dctx.moveTo(e.offsetX,e.offsetY);
};

});
}
});
}

/* ===== استخراج النص ===== */
function extractTextFromPDF(pdf){
currentPDFText="";
for(let i=1;i<=pdf.numPages;i++){
pdf.getPage(i).then(p=>{
p.getTextContent().then(t=>{
currentPDFText+=t.items.map(x=>x.str).join(" ");
});
});
}
}

/* ===== قراءة صوت ===== */
function startReading(){
if(!currentPDFText){alert("افتح ملف");return;}
speechUtterance=new SpeechSynthesisUtterance(currentPDFText);
speechUtterance.lang="ar-EG";
speechSynthesis.speak(speechUtterance);
}

function stopReading(){
speechSynthesis.cancel();
}

/* ===== قلم ===== */
function changeColor(c){currentColor=c;}

function clearDrawing(){
document.querySelectorAll("canvas").forEach(c=>{
let ctx=c.getContext("2d");
ctx && ctx.clearRect(0,0,c.width,c.height);
});
}

/* ===== Timer ===== */
function startTimer(){
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
seconds++;
document.getElementById("time").innerText=seconds;
},1000);
}

function resetTimer(){
clearInterval(timerInterval);
seconds=0;
document.getElementById("time").innerText=0;
}

/* ===== UI ===== */
function toggleMode(){
document.body.classList.toggle("light");
document.body.classList.toggle("dark");
}

function toggleSidebar(){
document.querySelector(".sidebar").classList.toggle("show");
}

</script>

</body>
</html>
